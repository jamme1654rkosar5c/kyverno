name: Bug Report - Validate Controller
description: Report a bug related to the Kyverno validate controller
labels: ["bug", "validate", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug in the Kyverno validate controller.
        Please fill out the sections below to help us reproduce and fix the issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting a bug report.
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read the [Kyverno documentation](https://kyverno.io/docs/).
          required: true
        - label: I am running a supported version of Kyverno.
          required: true

  - type: input
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      placeholder: e.g., v1.12.0
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: e.g., v1.28.0
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      description: How was Kyverno installed?
      options:
        - Helm
        - YAML manifests
        - Kustomize
        - Operator
        - Other
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Kyverno Policy
      description: Please provide the Kyverno validate policy that is causing the issue.
      placeholder: Paste your ClusterPolicy or Policy YAML here.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: resource
    attributes:
      label: Resource
      description: Please provide the Kubernetes resource that is being validated.
      placeholder: Paste the resource YAML here.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual behavior.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide detailed steps to reproduce the issue.
      placeholder: |
        1. Apply the policy...
        2. Apply the resource...
        3. Observe the behavior...
    validations:
      required: true

  - type: textarea
    id: validate-controller-logs
    attributes:
      label: Validate Controller Logs
      description: |
        Please provide relevant logs from the Kyverno admission controller or background controller.
        You can retrieve logs using: `kubectl logs -n kyverno -l app.kubernetes.io/component=admission-controller`
      placeholder: Paste relevant logs here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: policy-report
    attributes:
      label: Policy Report
      description: |
        If applicable, please provide the PolicyReport or ClusterPolicyReport output.
        You can retrieve it using: `kubectl get policyreport -A -o yaml`
      placeholder: Paste the PolicyReport YAML here.
      render: yaml
    validations:
      required: false

  - type: dropdown
    id: validate-rule-type
    attributes:
      label: Validate Rule Type
      description: What type of validate rule are you using?
      options:
        - pattern
        - deny
        - cel
        - manifests
        - podSecurity
        - assert
        - Other / Unknown
    validations:
      required: true

  - type: dropdown
    id: validation-failure-action
    attributes:
      label: Validation Failure Action
      description: What is the validationFailureAction set to in your policy?
      options:
        - Enforce
        - Audit
        - Unknown
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or information about the problem here.
      placeholder: Any additional information that may help diagnose the issue.
    validations:
      required: false
