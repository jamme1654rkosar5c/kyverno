name: Bug Report - Admission Controller
description: Report a bug related to the Kyverno admission controller
labels: ["bug", "admission-controller"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-requisites
      description: Please check the following before submitting a bug report.
      options:
        - label: I have searched the [existing issues](https://github.com/kyverno/kyverno/issues) and this is not a duplicate.
          required: true
        - label: I have read the [documentation](https://kyverno.io/docs/).
          required: true

  - type: input
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      placeholder: e.g. v1.11.0
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: e.g. v1.28.0
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      description: How did you install Kyverno?
      options:
        - Helm
        - YAML manifests
        - Kustomize
        - Operator
        - Other
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Policy Definition
      description: Please provide the Kyverno policy that is causing the issue.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: resource
    attributes:
      label: Resource Definition
      description: Please provide the Kubernetes resource that triggered the policy.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Apply policy '...'
        2. Create resource '...'
        3. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Kyverno Logs
      description: Please provide relevant logs from the Kyverno admission controller pod.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
