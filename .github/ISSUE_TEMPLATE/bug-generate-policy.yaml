name: Bug Report - Generate Policy
description: Report a bug related to Kyverno generate policies
labels: ["bug", "generate"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true
        - label: I have read the [documentation](https://kyverno.io/docs/).
          required: true

  - type: dropdown
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      options:
        - 1.12.x
        - 1.11.x
        - 1.10.x
        - Other (please specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      options:
        - "1.29"
        - "1.28"
        - "1.27"
        - "1.26"
        - "1.25"
        - Other (please specify in additional context)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Generate Policy
      description: Please provide the generate policy YAML that is causing the issue.
      render: yaml
      placeholder: |
        apiVersion: kyverno.io/v1
        kind: ClusterPolicy
        metadata:
          name: ...
        spec:
          rules:
            - name: ...
              match:
                ...
              generate:
                ...
    validations:
      required: true

  - type: textarea
    id: trigger-resource
    attributes:
      label: Trigger Resource
      description: Provide the resource that is supposed to trigger the generate rule.
      render: yaml
      placeholder: |
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ...
    validations:
      required: false

  - type: textarea
    id: expected-generated-resource
    attributes:
      label: Expected Generated Resource
      description: Provide the resource you expect to be generated.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Apply policy '...'
        2. Create resource '...'
        3. Observe that '...'
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: generate-controller-logs
    attributes:
      label: Generate Controller Logs
      description: |
        Please provide relevant logs from the generate controller.
        You can get them with: `kubectl logs -n kyverno -l app.kubernetes.io/component=generate-controller`
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., Helm values, environment details).
    validations:
      required: false
