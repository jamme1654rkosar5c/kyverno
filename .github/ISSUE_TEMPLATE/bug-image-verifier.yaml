name: Bug Report - Image Verifier
description: Report a bug related to image verification
labels: [bug, image-verifier]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues and this is not a duplicate
          required: true
        - label: I have read the documentation
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Kyverno Policy
      description: Paste the Kyverno policy YAML that is causing the issue.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: image
    attributes:
      label: Image Reference
      description: The image reference being verified (redact any sensitive info).
      placeholder: e.g., ghcr.io/org/image:tag
    validations:
      required: true

  - type: dropdown
    id: verifier_type
    attributes:
      label: Verifier Type
      description: What type of image verifier are you using?
      options:
        - Cosign
        - Notary
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Kyverno Logs
      description: Relevant logs from the Kyverno admission controller or image verifier.
      render: shell
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Apply policy '...'
        2. Deploy image '...'
        3. See error
    validations:
      required: true

  - type: input
    id: kyverno_version
    attributes:
      label: Kyverno Version
      placeholder: e.g., v1.11.0
    validations:
      required: true

  - type: input
    id: kubernetes_version
    attributes:
      label: Kubernetes Version
      placeholder: e.g., v1.28.0
    validations:
      required: true

  - type: dropdown
    id: kubernetes_platform
    attributes:
      label: Kubernetes Platform
      options:
        - EKS
        - GKE
        - AKS
        - Kind
        - K3s
        - OpenShift
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
    validations:
      required: false
