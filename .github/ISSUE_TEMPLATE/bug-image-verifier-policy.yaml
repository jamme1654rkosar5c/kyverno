name: Bug Report - Image Verification Policy
description: Report a bug related to image verification policies in Kyverno
labels: ["bug", "image-verify", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form below as completely as possible.
        Before submitting, please check if there is already an existing issue for your bug.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true
        - label: I have read the [documentation](https://kyverno.io/docs/).
          required: true
        - label: I am using a supported version of Kyverno.
          required: true

  - type: input
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      placeholder: e.g. v1.12.0
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: e.g. v1.28.0
    validations:
      required: true

  - type: dropdown
    id: image-registry
    attributes:
      label: Image Registry
      description: Which image registry are you using?
      options:
        - Docker Hub
        - Amazon ECR
        - Google Artifact Registry
        - Azure Container Registry
        - GitHub Container Registry
        - Harbor
        - Other
    validations:
      required: true

  - type: dropdown
    id: verification-type
    attributes:
      label: Verification Type
      description: What type of image verification are you using?
      options:
        - Cosign (keyless)
        - Cosign (key-based)
        - Notary
        - Attestation
        - SBOM
        - Other
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Kyverno Policy
      description: Please provide the Kyverno ImageVerificationPolicy or ClusterPolicy YAML.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: image-details
    attributes:
      label: Image Details
      description: |
        Provide details about the image being verified (name, tag, digest).
        Do NOT include any sensitive credentials.
      placeholder: |
        Image: registry.example.com/myapp:v1.0.0
        Digest: sha256:abc123...
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Apply the policy above
        2. Deploy a pod with the image
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Kyverno Logs
      description: |
        Please provide relevant Kyverno admission controller or image verifier logs.
        You can collect logs with: `kubectl logs -n kyverno -l app.kubernetes.io/component=admission-controller`
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., network policies, proxy settings, OPA/Gatekeeper conflicts).
    validations:
      required: false
