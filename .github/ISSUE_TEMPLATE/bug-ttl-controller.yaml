name: Bug Report - TTL Controller
description: Report a bug related to the TTL (Time-To-Live) controller
labels: [bug, ttl-controller]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the documentation
          required: true
        - label: I am using a supported version of Kyverno
          required: true

  - type: input
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      placeholder: e.g., v1.12.0
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: e.g., v1.28.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Kyverno Policy
      description: Please provide the Kyverno policy YAML that is causing the issue
      render: yaml
      placeholder: |
        apiVersion: kyverno.io/v1
        kind: ClusterPolicy
        metadata:
          name: ...
        spec:
          ...
    validations:
      required: true

  - type: textarea
    id: resource
    attributes:
      label: Resource with TTL Label/Annotation
      description: Please provide the resource YAML that has the TTL label or annotation
      render: yaml
      placeholder: |
        apiVersion: v1
        kind: ...
        metadata:
          name: ...
          labels:
            cleanup.kyverno.io/ttl: ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The resource should be deleted after the TTL expires...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: The resource was not deleted / was deleted too early...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Apply the policy...
        2. Create a resource with TTL label...
        3. Wait for TTL to expire...
        4. Observe that...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: TTL Controller Logs
      description: Please provide relevant logs from the TTL controller
      render: shell
      placeholder: Paste TTL controller logs here...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: Any additional information...
    validations:
      required: false
