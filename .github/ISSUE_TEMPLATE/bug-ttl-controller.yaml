name: Bug Report - TTL Controller
description: Report a bug related to the TTL (Time-To-Live) controller
labels: [bug, ttl-controller]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues.
          required: true
        - label: I have read the [documentation](https://kyverno.io/docs/).
          required: true

  - type: input
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      placeholder: e.g. v1.11.0
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: e.g. v1.28.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Policy
      description: Provide the Kyverno policy YAML that is causing the issue.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: resource
    attributes:
      label: Resource
      description: Provide the Kubernetes resource YAML with the TTL label/annotation.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Apply policy '...'
        2. Create resource with TTL label '...'
        3. Wait for TTL to expire
        4. Observe behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: TTL Controller Logs
      description: Provide relevant logs from the TTL controller pod.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
