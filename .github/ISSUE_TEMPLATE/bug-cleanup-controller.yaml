name: Bug Report - Cleanup Controller
description: Report a bug related to the Kyverno Cleanup Controller
labels: ["bug", "cleanup-controller", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Cleanup Policy
      description: Provide the CleanupPolicy or ClusterCleanupPolicy manifest.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: resource
    attributes:
      label: Target Resource
      description: Provide the resource manifest that should be cleaned up.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Cleanup Controller Logs
      description: Provide relevant logs from the cleanup controller pod.
      render: shell
    validations:
      required: false

  - type: input
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      placeholder: e.g. v1.11.0
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: e.g. v1.28.0
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - Helm
        - YAML manifests
        - Kustomize
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
