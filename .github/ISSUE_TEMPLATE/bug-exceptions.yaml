name: Bug Report - Policy Exceptions
description: Report a bug related to policy exceptions
labels: [bug, policy-exception]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: pre-checks
    attributes:
      label: Pre-checks
      description: Please ensure you have completed the following before submitting.
      options:
        - label: I have searched existing issues to ensure this is not a duplicate.
          required: true
        - label: I have read the [documentation](https://kyverno.io/docs/).
          required: true

  - type: dropdown
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      options:
        - 1.12.x
        - 1.11.x
        - 1.10.x
        - other
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: e.g. 1.29.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Policy YAML
      description: Provide the policy YAML that the exception applies to.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: exception
    attributes:
      label: PolicyException YAML
      description: Provide the PolicyException YAML.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: resource
    attributes:
      label: Resource YAML
      description: Provide the resource YAML that should be excepted.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Apply policy '...'
        2. Apply exception '...'
        3. Apply resource '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please provide relevant logs from the exception controller or admission controller.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
