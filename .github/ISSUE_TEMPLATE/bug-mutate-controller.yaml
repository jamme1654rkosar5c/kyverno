name: Bug Report - Mutate Policy
description: Report a bug related to mutate policies in Kyverno
labels: ["bug", "triage", "mutate"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting a bug report.
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read the [Kyverno documentation](https://kyverno.io/docs/).
          required: true
        - label: I have checked the [Kyverno FAQ](https://kyverno.io/docs/faq/).
          required: true

  - type: input
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you running?
      placeholder: e.g., v1.12.0
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: e.g., v1.28.0
    validations:
      required: true

  - type: dropdown
    id: installation-method
    attributes:
      label: Installation Method
      description: How was Kyverno installed?
      options:
        - Helm
        - YAML manifests
        - Kustomize
        - Operator
        - Other
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Mutate Policy
      description: Please provide the mutate policy that is causing the issue.
      render: yaml
      placeholder: |
        apiVersion: kyverno.io/v1
        kind: ClusterPolicy
        metadata:
          name: example-mutate-policy
        spec:
          rules:
            - name: mutate-rule
              match:
                resources:
                  kinds:
                    - Pod
              mutate:
                patchStrategicMerge:
                  spec:
                    containers:
                      - (name): "*"
    validations:
      required: true

  - type: textarea
    id: resource
    attributes:
      label: Resource Being Mutated
      description: Please provide the resource that the policy is being applied to.
      render: yaml
      placeholder: |
        apiVersion: v1
        kind: Pod
        metadata:
          name: example-pod
        spec:
          containers:
            - name: nginx
              image: nginx:latest
    validations:
      required: false

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected mutation result.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual behavior observed.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide detailed steps to reproduce the issue.
      placeholder: |
        1. Apply the policy above
        2. Create the resource above
        3. Observe the mutation result
        4. See the error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Kyverno Admission Controller Logs
      description: Please provide relevant logs from the Kyverno admission controller.
      render: shell
      placeholder: Paste relevant log output here.
    validations:
      required: false

  - type: textarea
    id: policy-report
    attributes:
      label: Policy Report
      description: If applicable, provide the PolicyReport or ClusterPolicyReport output.
      render: yaml
    validations:
      required: false

  - type: dropdown
    id: mutate-type
    attributes:
      label: Mutate Rule Type
      description: What type of mutate rule are you using?
      options:
        - patchStrategicMerge
        - patchesJson6902
        - foreach
        - mutateExistingResources
        - generate (mutate existing)
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
