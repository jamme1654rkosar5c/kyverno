name: Bug Report - Test Controller
description: Report a bug related to the Kyverno test controller or CLI test command
labels: [bug, test-controller]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-checks
      options:
        - label: I have read the [documentation](https://kyverno.io/docs/).
          required: true
        - label: I have searched for existing issues.
          required: true
        - label: I am using a supported version of Kyverno.
          required: true

  - type: dropdown
    id: kyverno-version
    attributes:
      label: Kyverno Version
      description: What version of Kyverno are you using?
      options:
        - 1.12.x
        - 1.11.x
        - 1.10.x
        - Other (please specify in description)
    validations:
      required: true

  - type: dropdown
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you using?
      options:
        - "1.29"
        - "1.28"
        - "1.27"
        - "1.26"
        - Other (please specify in description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: Policy
      description: Paste the Kyverno policy YAML used in the test.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: kyverno-test
    attributes:
      label: Kyverno Test Manifest
      description: Paste the kyverno-test.yaml manifest.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: command
    attributes:
      label: CLI Command
      description: The exact `kyverno test` command you ran.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or output.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create policy '...'
        2. Run `kyverno test ...`
        3. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any additional context, screenshots, or logs.
    validations:
      required: false
